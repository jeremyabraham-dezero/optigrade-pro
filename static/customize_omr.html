<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customize OMR Sheet</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <button class="toggle-btn btn btn-secondary" onclick="toggleDarkMode()">Dark Mode</button>
    <div class="content-wrapper">
        <div class="bubble-header text-white text-center">
            <h1 class="fade-in">Customize Your OMR Sheet</h1>
            <p class="lead fade-in">Create a personalized OMR sheet for your needs!</p>
        </div>

        <div class="container mt-4">
            <div class="row justify-content-center">
                <div class="col-12 col-md-6">
                    <div class="card p-4">
                        <h3 class="card-title text-center">Customize OMR</h3>
                        <form id="customizeForm" action="/generate_omr" method="POST">
                            <div class="mb-3">
                                <label for="numQuestions" class="form-label">Number of Questions (5-50)</label>
                                <input type="number" class="form-control" id="numQuestions" name="numQuestions" value="10" min="5" max="50" required>
                            </div>
                            <div class="mb-3">
                                <label for="numOptions" class="form-label">Options per Question (2-6)</label>
                                <input type="number" class="form-control" id="numOptions" name="numOptions" value="4" min="2" max="6" required>
                            </div>
                            <div class="mb-3">
                                <label for="bubbleSize" class="form-label">Bubble Size</label>
                                <select class="form-control" id="bubbleSize" name="bubbleSize" required>
                                    <option value="small">Small</option>
                                    <option value="medium" selected>Medium</option>
                                    <option value="large">Large</option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label for="bubbleShape" class="form-label">Bubble Shape</label>
                                <select class="form-control" id="bubbleShape" name="bubbleShape" required>
                                    <option value="circle" selected>Circle</option>
                                    <option value="square">Square</option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label for="studentId" class="form-label">Student ID</label>
                                <input type="text" class="form-control" id="studentId" name="studentId" placeholder="Enter student ID (any format)" value="1234567890">
                            </div>
                            <button type="submit" class="btn btn-primary w-100">Generate OMR Sheet</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function toggleDarkMode() {
            document.body.classList.toggle('dark');
            localStorage.setItem('theme', document.body.classList.contains('dark') ? 'dark' : 'light');
            document.querySelector('.toggle-btn').textContent = document.body.classList.contains('dark') ? 'Light Mode' : 'Dark Mode';
        }

        if (localStorage.getItem('theme') === 'dark') {
            document.body.classList.add('dark');
            document.querySelector('.toggle-btn').textContent = 'Light Mode';
        }

        document.getElementById('customizeForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const response = await fetch('/generate_omr', {
                method: 'POST',
                body: formData
            });
            if (response.ok) {
                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.style.display = 'none';
                a.href = url;
                a.download = response.headers.get('Content-Disposition')?.split('filename=')[1] || 'omr_sheet.png';
                document.body.appendChild(a);
                a.click();
                window.URL.revokeObjectURL(url);
            } else {
                const error = await response.json();
                alert('Error: ' + error.error);
            }
        });
    </script>
</body>
</html>
