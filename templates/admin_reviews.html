<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin - User Reviews</title>
    <link href="https://cdn.tailwindcss.com" rel="stylesheet">
</head>
<body class="bg-gray-100 dark:bg-gray-900 text-gray-800 dark:text-gray-200 p-6">
    <div class="max-w-5xl mx-auto">
        <h1 class="text-4xl font-bold mb-6 text-center">User Reviews (Admin Panel)</h1>
        
        <div class="mb-4 flex justify-between items-center">
            <input type="text" id="filterInput" placeholder="Search comments..." class="px-4 py-2 w-full max-w-md rounded border dark:border-gray-700 bg-white dark:bg-gray-800 focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>

        <div class="overflow-x-auto">
            <table class="min-w-full bg-white dark:bg-gray-800 rounded-lg shadow overflow-hidden">
                <thead>
                    <tr class="bg-gray-200 dark:bg-gray-700 text-left text-sm font-semibold uppercase">
                        <th class="px-6 py-3">#</th>
                        <th class="px-6 py-3">Rating</th>
                        <th class="px-6 py-3">Comment</th>
                        <th class="px-6 py-3">Timestamp</th>
                        <th class="px-6 py-3">Actions</th>
                    </tr>
                </thead>
                <tbody id="reviewsTableBody">
                    <!-- Rows will be inserted here by JS -->
                </tbody>
            </table>
        </div>
    </div>

    <script>
        async function loadReviews() {
            const res = await fetch("/reviews");
            const data = await res.json();
            window.reviewsData = data;
            renderTable(data);
        }

        function renderTable(data) {
            const tbody = document.getElementById("reviewsTableBody");
            const filterText = document.getElementById("filterInput").value.toLowerCase();
            tbody.innerHTML = "";

            if (!Array.isArray(data)) {
                tbody.innerHTML = '<tr><td colspan="5" class="px-6 py-4 text-red-500">Failed to load reviews</td></tr>';
                return;
            }

            data
              .filter(review => review.comment.toLowerCase().includes(filterText))
              .forEach((review, index) => {
                const date = new Date(review.timestamp * 1000).toLocaleString();
                const stars = '★'.repeat(review.rating) + '☆'.repeat(5 - review.rating);
                tbody.innerHTML += `
                    <tr class="border-t border-gray-300 dark:border-gray-700">
                        <td class="px-6 py-4">${index + 1}</td>
                        <td class="px-6 py-4 text-yellow-500">${stars}</td>
                        <td class="px-6 py-4">${review.comment}</td>
                        <td class="px-6 py-4 text-sm text-gray-500 dark:text-gray-400">${date}</td>
                        <td class="px-6 py-4">
                            <button onclick="deleteReview(${review.timestamp})" class="text-red-500 hover:text-red-700">Delete</button>
                        </td>
                    </tr>`;
              });
        }

        async function deleteReview(timestamp) {
            if (!confirm("Are you sure you want to delete this review?")) return;

            const res = await fetch(`/reviews/delete/${timestamp}`, { method: "DELETE" });
            if (res.ok) {
                window.reviewsData = window.reviewsData.filter(r => r.timestamp !== timestamp);
                renderTable(window.reviewsData);
            } else {
                alert("Failed to delete review.");
            }
        }

        document.getElementById("filterInput").addEventListener("input", () => renderTable(window.reviewsData));
        loadReviews();
    </script>
</body>
</html>
